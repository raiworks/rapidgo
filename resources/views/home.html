<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center text-white font-sans">

    <div class="text-center px-6">
        <!-- Logo -->
        <div class="mb-8">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-2xl bg-gradient-to-br from-emerald-400 to-cyan-500 shadow-lg shadow-emerald-500/25 mb-6">
                <svg class="w-14 h-14 text-white" fill="none" viewBox="0 0 48 48" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M24 4L6 14v20l18 10 18-10V14L24 4z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M24 24V44M6 14l18 10 18-10"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 9l9 5 9-5"/>
                </svg>
            </div>
            <h1 class="text-5xl font-bold tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                RGo Framework
            </h1>
            <p class="mt-3 text-lg text-slate-400">
                v{{ .version }}
            </p>
        </div>

        <!-- Status -->
        <div class="mb-10">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500/10 border border-emerald-500/20">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                </span>
                <span class="text-sm text-emerald-400 font-medium">Application is running</span>
            </div>
        </div>

        <!-- Feature cards -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-2xl mx-auto mb-12">
            <div class="group p-5 rounded-xl bg-white/5 border border-white/10 hover:border-emerald-500/30 hover:bg-white/[0.07] transition-all duration-300">
                <div class="text-2xl mb-2">⚡</div>
                <h3 class="font-semibold text-sm text-white">Fast</h3>
                <p class="text-xs text-slate-400 mt-1">Built on Gin with zero-alloc routing</p>
            </div>
            <div class="group p-5 rounded-xl bg-white/5 border border-white/10 hover:border-cyan-500/30 hover:bg-white/[0.07] transition-all duration-300">
                <div class="text-2xl mb-2">🧩</div>
                <h3 class="font-semibold text-sm text-white">Modular</h3>
                <p class="text-xs text-slate-400 mt-1">Service container &amp; provider architecture</p>
            </div>
            <div class="group p-5 rounded-xl bg-white/5 border border-white/10 hover:border-emerald-500/30 hover:bg-white/[0.07] transition-all duration-300">
                <div class="text-2xl mb-2">🔒</div>
                <h3 class="font-semibold text-sm text-white">Secure</h3>
                <p class="text-xs text-slate-400 mt-1">CSRF, CORS, rate limiting &amp; JWT auth</p>
            </div>
        </div>

        <!-- Links -->
        <div class="flex flex-wrap items-center justify-center gap-4">
            <a href="#" class="inline-flex items-center gap-2 px-6 py-3 rounded-lg bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-semibold text-sm hover:from-emerald-600 hover:to-cyan-600 transition-all shadow-lg shadow-emerald-500/25 hover:shadow-emerald-500/40">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                Documentation
            </a>
            <a href="https://github.com/RAiWorks/RGo" target="_blank" rel="noopener" class="inline-flex items-center gap-2 px-6 py-3 rounded-lg bg-white/5 border border-white/10 text-slate-300 font-semibold text-sm hover:bg-white/10 hover:text-white transition-all">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                GitHub
            </a>
        </div>

        <!-- Footer -->
        <p class="mt-16 text-xs text-slate-500">
            RGo Framework &middot; {{ .goVersion }} &middot; Environment: {{ .env }}
        </p>
    </div>

</body>
</html>
